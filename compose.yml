services:
  db:
    image: anilkumarnarapalli/pyapp:db-image
    deploy:
      replicas: 1
    ports:
      - "3306:3306"
    networks:
      - mynetwork

  auth_service:
    image: anilkumarnarapalli/pyapp:auth-image
    deploy:
      replicas: 1
    ports:
      - "5001:5001"
    networks:
      - mynetwork

  book_service:
    image: anilkumarnarapalli/pyapp:book_image
    deploy:
      replicas: 1
    ports:
      - "5002:5002"
    depends_on:
      - db
    networks:
      - mynetwork

  borrow_service:
    image: anilkumarnarapalli/pyapp:borrow_image
    deploy:
      replicas: 1
    ports:
      - "5003:5003"
    networks:
      - mynetwork

  frontend:
    image: anilkumarnarapalli/pyapp:frontend
    deploy:
      replicas: 1
    ports:
      - "5000:5000"
    depends_on:
      - db
      - auth_service
      - book_service
      - borrow_service
      
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: overlay

  
