services:
  db:
    image: anilkumarnaraplli/pyapp:db-image
    deploy:
      replicas: 1
    ports:
      - "3306:3306"
    networks:
      - mynetwork

  auth_service:
    image: anilkumarnaraplli/pyapp:auth-image
    deploy:
      replicas: 1
    ports:
      - "5001:5001"
    networks:
      - mynetwork

  book_service:
    image: anilkumarnaraplli/pyapp:book-image
    deploy:
      replicas: 1
    ports:
      - "5002:5002"
    depends_on:
      - db
    networks:
      - mynetwork

  borrow_service:
    image: anilkumarnaraplli/pyapp:borrow-image
    deploy:
      replicas: 1
    ports:
      - "5003:5003"
    networks:
      - mynetwork

  frontend:
    image: anilkumarnaraplli/pyapp:frontend-image
    deploy:
      replicas: 1
    ports:
      - "5000:5000"
    depends_on:
      - auth_service
      - book_service
      - borrow_service
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: overlay
